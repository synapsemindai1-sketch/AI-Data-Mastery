kind = "web"
previewPath = "/"
title = "AI Data Trainer Mastery"
version = "1.0.0"
id = "artifacts/ai-trainer-course"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21866

[services.development]
run = "pnpm --filter @workspace/ai-trainer-course run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-trainer-course", "run", "build" ]
publicDir = "artifacts/ai-trainer-course/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21866"
BASE_PATH = "/"
