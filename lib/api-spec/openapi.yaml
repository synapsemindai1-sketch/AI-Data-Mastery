openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Data Trainer Mastery Course Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: courses
    description: Course operations
  - name: modules
    description: Module operations
  - name: lessons
    description: Lesson operations
  - name: progress
    description: Progress tracking
  - name: quizzes
    description: Quiz operations
  - name: dashboard
    description: Dashboard summary
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /courses:
    get:
      operationId: listCourses
      tags: [courses]
      summary: List all courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a course by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found

  /courses/{id}/stats:
    get:
      operationId: getCourseStats
      tags: [courses]
      summary: Get completion stats for a course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseStats"

  /modules/{id}:
    get:
      operationId: getModule
      tags: [modules]
      summary: Get a module by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleDetail"

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a lesson by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /lessons/{id}/quiz:
    get:
      operationId: getLessonQuiz
      tags: [quizzes]
      summary: Get quiz for a lesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"
        "404":
          description: No quiz for this lesson

  /progress:
    get:
      operationId: getProgress
      tags: [progress]
      summary: Get all lesson progress
      responses:
        "200":
          description: Progress list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LessonProgress"
    post:
      operationId: markLessonComplete
      tags: [progress]
      summary: Mark a lesson as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressInput"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonProgress"

  /quiz-attempts:
    post:
      operationId: submitQuizAttempt
      tags: [quizzes]
      summary: Submit quiz answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAttemptInput"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  /quiz-attempts/lesson/{lessonId}:
    get:
      operationId: getQuizAttempts
      tags: [quizzes]
      summary: Get quiz attempts for a lesson
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of quiz attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizResult"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Overall learning summary for the user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /certificates:
    get:
      operationId: getCertificates
      tags: [dashboard]
      summary: Get earned certificates
      responses:
        "200":
          description: List of certificates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Course:
      type: object
      required: [id, title, description, level, durationHours, totalLessons, instructor, category, thumbnail]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        level:
          type: string
          enum: [Beginner, Intermediate, Advanced]
        durationHours:
          type: number
        totalLessons:
          type: integer
        instructor:
          type: string
        category:
          type: string
        thumbnail:
          type: string
        completionPercent:
          type: ["number", "null"]

    CourseDetail:
      type: object
      required: [id, title, description, level, durationHours, totalLessons, instructor, category, thumbnail, modules, objectives, prerequisites]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        level:
          type: string
        durationHours:
          type: number
        totalLessons:
          type: integer
        instructor:
          type: string
        category:
          type: string
        thumbnail:
          type: string
        objectives:
          type: array
          items:
            type: string
        prerequisites:
          type: array
          items:
            type: string
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleSummary"
        completionPercent:
          type: ["number", "null"]

    ModuleSummary:
      type: object
      required: [id, title, order, totalLessons]
      properties:
        id:
          type: integer
        title:
          type: string
        order:
          type: integer
        totalLessons:
          type: integer
        completedLessons:
          type: ["integer", "null"]

    ModuleDetail:
      type: object
      required: [id, courseId, title, order, lessons]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        order:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/LessonSummary"

    LessonSummary:
      type: object
      required: [id, moduleId, title, type, durationMinutes, order]
      properties:
        id:
          type: integer
        moduleId:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [video, reading, quiz, exercise]
        durationMinutes:
          type: integer
        order:
          type: integer
        completed:
          type: ["boolean", "null"]

    Lesson:
      type: object
      required: [id, moduleId, title, type, durationMinutes, order, content]
      properties:
        id:
          type: integer
        moduleId:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [video, reading, quiz, exercise]
        durationMinutes:
          type: integer
        order:
          type: integer
        content:
          type: string
        videoUrl:
          type: ["string", "null"]
        hasQuiz:
          type: boolean
        completed:
          type: ["boolean", "null"]
        nextLessonId:
          type: ["integer", "null"]
        prevLessonId:
          type: ["integer", "null"]

    Quiz:
      type: object
      required: [id, lessonId, title, questions]
      properties:
        id:
          type: integer
        lessonId:
          type: integer
        title:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"

    QuizQuestion:
      type: object
      required: [id, question, options]
      properties:
        id:
          type: integer
        question:
          type: string
        options:
          type: array
          items:
            type: string
        explanation:
          type: ["string", "null"]

    QuizAttemptInput:
      type: object
      required: [quizId, answers]
      properties:
        quizId:
          type: integer
        answers:
          type: array
          items:
            type: object
            required: [questionId, selectedOption]
            properties:
              questionId:
                type: integer
              selectedOption:
                type: integer

    QuizQuestionResult:
      type: object
      required: [questionId, selectedOption, correctOption, correct]
      properties:
        questionId:
          type: integer
        selectedOption:
          type: integer
        correctOption:
          type: integer
        correct:
          type: boolean
        explanation:
          type: ["string", "null"]

    QuizResult:
      type: object
      required: [id, quizId, score, totalQuestions, correctAnswers, passed, completedAt]
      properties:
        id:
          type: integer
        quizId:
          type: integer
        score:
          type: number
        totalQuestions:
          type: integer
        correctAnswers:
          type: integer
        passed:
          type: boolean
        completedAt:
          type: string
        questionResults:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestionResult"

    LessonProgress:
      type: object
      required: [lessonId, completed, lastAccessedAt]
      properties:
        lessonId:
          type: integer
        completed:
          type: boolean
        lastAccessedAt:
          type: string

    ProgressInput:
      type: object
      required: [lessonId, completed]
      properties:
        lessonId:
          type: integer
        completed:
          type: boolean

    CourseStats:
      type: object
      required: [courseId, totalLessons, completedLessons, completionPercent, totalDurationMinutes, estimatedTimeRemainingMinutes, quizzesPassed]
      properties:
        courseId:
          type: integer
        totalLessons:
          type: integer
        completedLessons:
          type: integer
        completionPercent:
          type: number
        totalDurationMinutes:
          type: integer
        estimatedTimeRemainingMinutes:
          type: integer
        quizzesPassed:
          type: integer

    DashboardSummary:
      type: object
      required: [totalCoursesEnrolled, totalLessonsCompleted, totalHoursLearned, currentStreak, weeklyProgress, recentLessons]
      properties:
        totalCoursesEnrolled:
          type: integer
        totalLessonsCompleted:
          type: integer
        totalHoursLearned:
          type: number
        currentStreak:
          type: integer
        weeklyProgress:
          type: array
          items:
            type: object
            required: [day, lessonsCompleted]
            properties:
              day:
                type: string
              lessonsCompleted:
                type: integer
        recentLessons:
          type: array
          items:
            type: object
            required: [lessonId, lessonTitle, courseTitle, completedAt]
            properties:
              lessonId:
                type: integer
              lessonTitle:
                type: string
              courseTitle:
                type: string
              completedAt:
                type: string

    Certificate:
      type: object
      required: [id, courseId, courseTitle, issuedAt, instructor]
      properties:
        id:
          type: integer
        courseId:
          type: integer
        courseTitle:
          type: string
        issuedAt:
          type: string
        instructor:
          type: string

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
